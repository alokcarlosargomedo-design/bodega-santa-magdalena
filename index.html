<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.E. Santa Magdalena - Bodega</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f9; color: #333333; margin: 0; padding: 0; display: flex; justify-content: center; }
        .contenedor-celular { width: 100%; max-width: 400px; background-color: white; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.1); position: relative; padding-bottom: 60px; box-sizing: border-box; }
        .cabecera { background-color: #6366F1; color: white; padding: 18px; text-align: center; font-weight: bold; font-size: 18px; position: relative; }
        .btn-regresar { position: absolute; left: 15px; top: 18px; cursor: pointer; background: none; border: none; color: white; font-size: 18px; }
        .pantalla { padding: 20px; }
        .oculto { display: none !important; }
        .btn-menu { background: white; color: black; border: 2px solid #e0e0e0; padding: 25px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; margin-bottom: 20px; cursor: pointer; text-align: center; }
        .btn-menu:hover { border-color: #6366F1; color: #6366F1; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; margin-bottom: 15px; }
        th, td { border: 1px solid #e0e0e0; padding: 12px; text-align: left; }
        th { background-color: #f8fafc; }
        .btn-principal { background-color: #6366F1; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .tarjeta-deudor { border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .campo-texto { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .campo-texto:focus { border-color: #6366F1; outline: none; }
    </style>
</head>
<body>

    <div class="contenedor-celular">

        <div id="pantalla-login" class="pantalla">
            <h2 style="text-align: center; margin-top: 40px; color: #6366F1;">I.E. Santa Magdalena</h2>
            <p style="text-align: center; color: gray;">Ingresa a tu cuenta</p>
            
            <div style="margin-top: 30px;">
                <label style="display:block; margin-bottom:8px; font-weight:bold;">USUARIO</label>
                <input type="text" id="login-usuario" class="campo-texto" placeholder="Escribe tu usuario">
                
                <label style="display:block; margin-top:15px; margin-bottom:8px; font-weight:bold;">CLAVE</label>
                <input type="password" id="login-clave" class="campo-texto" placeholder="Escribe tu clave">
                
                <button class="btn-principal" style="margin-top: 30px;" onclick="iniciarSesion()">INGRESAR</button>
            </div>
        </div>

        <div id="pantalla-menu" class="pantalla oculto">
            <h2 style="text-align: center; margin-top: 40px;">I.E. Santa Magdalena</h2>
            <p style="text-align: center; color: gray;">Bienvenido a tu negocio</p>
            
            <div style="margin-top: 40px;">
                <button class="btn-menu" onclick="irA('pantalla-inventario')">INVENTARIO</button>
                <button class="btn-menu" onclick="irA('pantalla-ventas')">REGISTRO DE VENTAS</button>
                <button class="btn-menu" onclick="irA('pantalla-deudores')">MIS GANANCIAS / DEUDORES</button>
            </div>
        </div>

        <div id="pantalla-inventario" class="pantalla oculto">
            <div class="cabecera">
                <button class="btn-regresar" onclick="irA('pantalla-menu')">←</button>
                INVENTARIO
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Stok</th>
                    </tr>
                </thead>
                <tbody id="tabla-inventario-cuerpo"></tbody>
            </table>
            
            <div style="margin-top: 15px; border: 1px solid #e0e0e0; padding: 10px; border-radius: 6px;">
                <input type="text" id="nuevo-nombre" class="campo-texto" placeholder="Nombre del producto" style="margin-bottom: 5px;">
                <input type="number" id="nuevo-stock" class="campo-texto" placeholder="Cantidad / Stock">
            </div>
            <button class="btn-principal" style="margin-top: 10px;" onclick="agregarProductoNuevo()">AGREGAR PRODUCTO</button>
        </div>

        <div id="pantalla-ventas" class="pantalla oculto">
            <div class="cabecera">
                <button class="btn-regresar" onclick="irA('pantalla-menu')">←</button>
                REGISTRO DE VENTAS
            </div>
            <p style="font-size: 14px; color: gray; margin: 10px 0;">Fecha: 18/07/26 | Hora: 12:00</p>
            <table>
                <thead><tr><th>Producto</th><th>Cant.</th><th>Total</th></tr></thead>
                <tbody><tr><td>Cuaderno</td><td>2</td><td>S/10.00</td></tr></tbody>
            </table>
        </div>

        <div id="pantalla-deudores" class="pantalla oculto">
            <div class="cabecera">
                <button class="btn-regresar" onclick="irA('pantalla-menu')">←</button>
                MIS DEUDORES
            </div>
            <div id="lista-deudores"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
